name: Build and Publish Addon Release

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional custom release tag (e.g. v1.2.0)"
        required: false
        type: string
      prerelease:
        description: "Create as prerelease"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve project version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(python -c "import json; print(json.load(open('manifest.json', encoding='utf-8'))['version'])")"
          if [[ -z "$VERSION" ]]; then
            echo "manifest.json has empty version" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build artifacts
        run: python scripts/build_release.py

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            INPUT_TAG="${{ github.event.inputs.tag }}"
            if [[ -n "$INPUT_TAG" ]]; then
              TAG="$INPUT_TAG"
            else
              TAG="main-v${{ steps.version.outputs.version }}-${GITHUB_RUN_NUMBER}"
            fi
            PRERELEASE="${{ github.event.inputs.prerelease }}"
            TARGET="${GITHUB_SHA}"
            TITLE="${TAG}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
            PRERELEASE="false"
            TARGET=""
            TITLE="${TAG}"
          else
            TAG="main-v${{ steps.version.outputs.version }}-${GITHUB_RUN_NUMBER}"
            PRERELEASE="true"
            TARGET="${GITHUB_SHA}"
            TITLE="Main build v${{ steps.version.outputs.version }} #${GITHUB_RUN_NUMBER}"
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "target=${TARGET}" >> "$GITHUB_OUTPUT"
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"

      - name: Prepare release notes from changelog
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ steps.meta.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          RELEASE_NOTES_FILE="$RUNNER_TEMP/release_notes.md"

          PREV_TAG="$(gh release list --limit 100 --json tagName --jq '.[].tagName' | grep -Fxv "$TAG" | head -n1 || true)"

          CHANGELOG_SECTION="$(awk -v wanted="v${VERSION}" '
            /^## / {
              if (found) {
                exit
              }
              if ($0 ~ ("^## " wanted "([[:space:]]|\\(|$)")) {
                found = 1
              }
            }
            found {
              print
            }
          ' CHANGELOG.md)"

          {
            if [[ -n "$PREV_TAG" ]]; then
              echo "Full Changelog: $PREV_TAG...$TAG"
            fi
            echo
            if [[ -n "$CHANGELOG_SECTION" ]]; then
              echo "$CHANGELOG_SECTION"
            else
              echo "## v${VERSION}"
              echo
              echo "- Release notes were not found in CHANGELOG.md for this version."
            fi
          } > "$RELEASE_NOTES_FILE"

          echo "file=$RELEASE_NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag }}"
          TITLE="${{ steps.meta.outputs.title }}"
          TARGET="${{ steps.meta.outputs.target }}"
          PRERELEASE="${{ steps.meta.outputs.prerelease }}"

          EXTRA_ARGS=()
          if [[ -n "$TARGET" ]]; then
            EXTRA_ARGS+=(--target "$TARGET")
          fi
          if [[ "$PRERELEASE" == "true" ]]; then
            EXTRA_ARGS+=(--prerelease)
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/*.ankiaddon --clobber
          else
            gh release create "$TAG" dist/*.ankiaddon \
              --title "$TITLE" \
              --notes-file "${{ steps.notes.outputs.file }}" \
              "${EXTRA_ARGS[@]}"
          fi
